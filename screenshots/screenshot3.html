<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1242px; height: 2688px; background: #faf7f2; font-family: system-ui, sans-serif; }
.screen { width: 1242px; height: 2688px; background: #faf7f2; padding: 120px 60px 60px; }
.nav { display: flex; align-items: center; padding: 20px 0 48px; }
.back { font-size: 40px; color: #c8a96e; margin-right: 24px; }
.nav h1 { font-size: 48px; color: #2c2416; font-family: Georgia, serif; }
.card { background: #fff; border-radius: 24px; padding: 60px 48px; margin-bottom: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.card-title { font-size: 36px; color: #c8a96e; font-family: Georgia, serif; margin-bottom: 32px; font-weight: 600; }
.photo-area { width: 100%; height: 500px; background: #f0e8dc; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; border: 2px dashed #d4bb8a; }
.photo-area .icon { font-size: 80px; opacity: 0.5; }
.photo-area .text { font-size: 32px; color: #8a7e6b; margin-top: 16px; }
.photo-content { text-align: center; }
.field { margin-bottom: 36px; }
.field label { display: block; font-size: 26px; color: #8a7e6b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
.field .input { width: 100%; padding: 28px 20px; border: 2px solid #e0d5c4; border-radius: 14px; font-size: 34px; color: #2c2416; background: #fff; }
.field .input.filled { background: #faf7f2; }
.field textarea { width: 100%; padding: 28px 20px; border: 2px solid #e0d5c4; border-radius: 14px; font-size: 30px; color: #2c2416; background: #fff; height: 200px; resize: none; line-height: 1.6; }
.date-row { display: flex; gap: 20px; }
.date-row .field { flex: 1; }
.save-btn { width: 100%; padding: 36px; background: #c8a96e; color: #fff; border: none; border-radius: 16px; font-size: 38px; font-family: Georgia, serif; text-align: center; font-weight: 600; margin-top: 20px; }
.camera-btn { position: absolute; bottom: 16px; right: 16px; width: 80px; height: 80px; background: #c8a96e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: #fff; }
</style></head><body>
<div class="screen">
  <div class="nav">
    <span class="back">‹</span>
    <h1>👶 Child Info</h1>
  </div>

  <div class="card">
    <div class="card-title">Hero Photo</div>
    <div class="photo-area">
      <div class="photo-content">
        <div class="icon">📷</div>
        <div class="text">Tap to add a photo</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Baby's Information</div>
    <div class="field">
      <label>First Name</label>
      <div class="input filled">Emma</div>
    </div>
    <div class="field">
      <label>Middle Name</label>
      <div class="input filled">Rose</div>
    </div>
    <div class="field">
      <label>Last Name</label>
      <div class="input filled">Thompson</div>
    </div>
    <div class="card-title" style="margin-top: 20px;">Date of Birth</div>
    <div class="date-row">
      <div class="field">
        <label>Month</label>
        <div class="input filled">March</div>
      </div>
      <div class="field">
        <label>Day</label>
        <div class="input filled">15</div>
      </div>
      <div class="field">
        <label>Year</label>
        <div class="input filled">2026</div>
      </div>
    </div>
  </div>

  <div class="save-btn">Save Changes</div>
</div>
</body></html>

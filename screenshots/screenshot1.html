<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1242px; height: 2688px; background: #faf7f2; font-family: Georgia, serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.phone { width: 1242px; height: 2688px; background: #faf7f2; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 200px 120px; }
.brand { text-align: center; margin-bottom: 80px; }
.brand h1 { font-size: 72px; color: #c8a96e; letter-spacing: 4px; margin-bottom: 16px; }
.brand p { font-size: 36px; color: #8a7e6b; }
.card { background: #fff; border-radius: 32px; padding: 80px 60px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
.field { margin-bottom: 48px; }
.field label { display: block; font-size: 28px; color: #8a7e6b; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; font-family: system-ui, sans-serif; }
.field .input { width: 100%; padding: 32px 24px; border: 2px solid #e0d5c4; border-radius: 16px; font-size: 36px; color: #2c2416; background: #fff; font-family: system-ui, sans-serif; }
.btn { width: 100%; padding: 40px; background: #c8a96e; color: #fff; border: none; border-radius: 16px; font-size: 40px; font-family: Georgia, serif; text-align: center; margin-top: 24px; font-weight: 600; }
.signup-link { text-align: center; margin-top: 48px; font-size: 30px; color: #8a7e6b; font-family: system-ui, sans-serif; }
.signup-link a { color: #c8a96e; text-decoration: none; }
.tagline { text-align: center; margin-top: 80px; font-size: 32px; color: #b8ad9e; font-style: italic; }
</style></head><body>
<div class="phone">
  <div class="brand">
    <h1>✦ Legacy Odyssey</h1>
    <p>Your Family's Story, Beautifully Told</p>
  </div>
  <div class="card">
    <div class="field">
      <label>Email</label>
      <div class="input">sarah@example.com</div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input" style="letter-spacing:8px">••••••••••</div>
    </div>
    <div class="btn">Sign In</div>
    <div class="signup-link">Don't have an account? <a>Sign up at legacyodyssey.com</a></div>
  </div>
  <div class="tagline">Beautiful baby books & family photo albums</div>
</div>
</body></html>

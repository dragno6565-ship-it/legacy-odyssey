<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 500px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Georgia', serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.content {
  text-align: center;
  padding: 0 60px;
}
.brand {
  color: #c8a96e;
  font-size: 18px;
  letter-spacing: 4px;
  margin-bottom: 16px;
}
h1 {
  color: #ffffff;
  font-size: 48px;
  line-height: 1.2;
  margin-bottom: 12px;
  font-weight: 400;
}
h1 em { color: #c8a96e; font-style: italic; }
p {
  color: rgba(255,255,255,0.6);
  font-size: 22px;
  line-height: 1.5;
}
</style>
</head>
<body>
  <div class="content">
    <div class="brand">LEGACY ODYSSEY</div>
    <h1>Your Family's Story,<br><em>Beautifully Told</em></h1>
    <p>Digital baby books & family photo albums on your own custom website</p>
  </div>
</body>
</html>

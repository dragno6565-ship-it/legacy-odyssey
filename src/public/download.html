<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download — Legacy Odyssey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf7f2;
      font-family: 'Jost', sans-serif;
      color: #2c2416;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1A1A2E;
      padding: 20px 24px;
      text-align: center;
    }

    header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: #C9A96E;
      letter-spacing: 1px;
    }

    header p {
      font-size: 11px;
      color: #A0A0B8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0d5c4;
      border-radius: 14px;
      padding: 44px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      line-height: 1;
    }

    .card h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: #1A1A2E;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #8a7e6b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .store-btn {
      display: block;
      padding: 15px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn-ios {
      background: #1A1A2E;
      color: #fff;
    }

    .store-btn-android {
      background: #C9A96E;
      color: #fff;
    }

    /* Redirecting state */
    .redirecting {
      display: none;
    }

    .redirecting p {
      margin-bottom: 0;
      font-size: 15px;
      color: #8a7e6b;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e0d5c4;
      border-top-color: #C9A96E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      background: #1A1A2E;
      padding: 20px 24px;
      text-align: center;
    }

    footer p {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      color: #C9A96E;
    }

    footer small {
      display: block;
      font-size: 11px;
      color: #6A6A8A;
      margin-top: 4px;
      font-family: 'Jost', sans-serif;
    }
  </style>
</head>
<body>

  <header>
    <h1>Legacy Odyssey</h1>
    <p>A Baby Book as Unique as Your Family</p>
  </header>

  <main>
    <div class="card">

      <!-- Auto-redirect state (shown briefly on mobile) -->
      <div class="redirecting" id="redirecting-view">
        <div class="spinner"></div>
        <p>Taking you to the app store&hellip;</p>
      </div>

      <!-- Manual selection (shown on desktop, or as fallback) -->
      <div id="choose-view">
        <div class="icon">📱</div>
        <h2>Get the App</h2>
        <p>Download Legacy Odyssey to start building your family's book.</p>
        <div class="store-buttons">
          <a href="https://apps.apple.com/app/id6760883565" class="store-btn store-btn-ios" id="ios-btn">
            🍎 Download on the App Store
          </a>
          <a href="https://play.google.com/store/apps/details?id=com.legacyodyssey.app" class="store-btn store-btn-android" id="android-btn">
            🤖 Get it on Google Play
          </a>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>Legacy Odyssey</p>
    <small>Every family has a story worth telling.</small>
  </footer>

  <script>
    const IOS_URL     = 'https://apps.apple.com/app/id6760883565';
    const ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.legacyodyssey.app';

    function detect() {
      const ua = navigator.userAgent || '';
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
      if (/Android/.test(ua)) return 'android';
      return 'desktop';
    }

    const platform = detect();

    if (platform === 'ios') {
      document.getElementById('choose-view').style.display = 'none';
      document.getElementById('redirecting-view').style.display = 'block';
      setTimeout(() => { window.location.href = IOS_URL; }, 800);
    } else if (platform === 'android') {
      document.getElementById('choose-view').style.display = 'none';
      document.getElementById('redirecting-view').style.display = 'block';
      setTimeout(() => { window.location.href = ANDROID_URL; }, 800);
    }
    // Desktop: both buttons shown, no redirect
  </script>

</body>
</html>
